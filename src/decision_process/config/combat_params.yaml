# ============================================================
# 战斗相关参数
# ============================================================
decision_process_node:
  ros__parameters:

    # ---------- 弹药 ----------
    ammo_threshold: 0         # 弹药不足阈值 (子弹数)

    # ---------- 防御 ----------
    HP_DEFENCE_THRESHOLD: 160 # 血量低于此值转防御姿态
    HP_RETURN_UNDER_DEFENSE: 120 # 存在60%及以上防御增益时，血量低于此值回城补血 (优先级低于转防御姿态)
    HP_RETURN_THRESHOLD: 200 # 血量低于此值回城补血 (优先级高于转防御姿态)

    # ---------- 躲避 ----------
    use_dynamic_dodge: false    # false=使用预设安全点 true=使用动态计算安全点
    dodge_duration: 3.0         # 单次躲避持续时长 (s)
    safe_points_x: [7.0, 12.0, 7.0, 12.0]   # 静态安全点X坐标列表 (use_dynamic_dodge=false时生效)
    safe_points_y: [3.0, 3.0, 5.0, 5.0]     # 静态安全点Y坐标列表

    # ---------- 追击距离控制 ----------
    min_dist: 1.2             # 后退阈值 — 距离小于此值后退 (m)
    max_dist: 4.0             # 追击阈值 — 距离大于此值追击 (m)
    close_to: 2.8             # 追击时靠近到此距离 (m)
    back_to: 1.8              # 后退时退到此距离 (m)
