# ============================================================
# 战斗相关参数
# ============================================================
decision_process_node:
  ros__parameters:

    # ---------- 弹药 ----------
    ammo_threshold: 0         # 弹药不足阈值 (子弹数)

    # ---------- 防御 ----------
    defence_hp_threshold: 160 # 血量低于此值转防御姿态

    # ---------- 躲避 ----------
    dodge_radius: 2.0         # 随机躲避半径 (m)

    # ---------- 追击距离控制 ----------
    min_dist: 1.2             # 后退阈值 — 距离小于此值后退 (m)
    max_dist: 4.0             # 追击阈值 — 距离大于此值追击 (m)
    close_to: 2.8             # 追击时靠近到此距离 (m)
    back_to: 1.8              # 后退时退到此距离 (m)
